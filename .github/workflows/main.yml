name: Sentinel Live Validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Run TEST 1 (manifest-lie)
        run: node bin/sentinel-scan.js check --manifest ./test-fixtures/manifest-lie/sentinel.manifest.json --json

      - name: Run TEST 2 (dead-code)
        run: node bin/sentinel-scan.js check --manifest ./test-fixtures/dead-code/sentinel.manifest.json --json

      - name: Run TEST 3A (partial)
        run: node bin/sentinel-scan.js check --manifest ./test-fixtures/partial/sentinel.manifest.json --json

      - name: Run TEST 3B (full)
        run: node bin/sentinel-scan.js check --manifest ./test-fixtures/full/sentinel.manifest.json --json
