name: 🐛 Bug Report
description: Report a bug or technical issue in the Sentinel CLI
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      placeholder: e.g., v20.10.0
    validations:
      required: true
  - type: textarea
    id: version_info
    attributes:
      label: Sentinel Version
      description: Run `npx @radu_api/sentinel-scan --version` (or `npx sentinel --version`)
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Create manifest.json with...
        2. Run 'npx sentinel-scan ...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal Logs
      description: Please paste any error logs here.
